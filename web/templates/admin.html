{% extends "base.html" %}
{% block content %}
<h1>🛠️ Admin Panel</h1>
{% if msg %}<div class="msg success">{{ msg }}</div>{% endif %}
{% if error %}<div class="msg error">{{ error }}</div>{% endif %}

<div class="admin-grid">
    <div class="card">
        <h2>💰 Tặng Coin</h2>
        <form method="post" action="/admin/coins">
            <select name="player_id" required>
                <option value="">-- Chọn người chơi --</option>
                {% for p in players %}
                <option value="{{ p.id }}">{{ p.name }} (Lv.{{ p.level }})</option>
                {% endfor %}
            </select>
            <input name="amount" placeholder="Số coin" type="number" required>
            <button type="submit">Tặng</button>
        </form>
    </div>

    <div class="card">
        <h2>🏰 Tặng Lượt Bí Cảnh</h2>
        <form method="post" action="/admin/dungeon">
            <select name="player_id" required>
                <option value="">-- Chọn người chơi --</option>
                {% for p in players %}
                <option value="{{ p.id }}">{{ p.name }} (Lv.{{ p.level }})</option>
                {% endfor %}
            </select>
            <input name="entries" placeholder="Số lượt tặng" type="number" value="1" min="1" required>
            <button type="submit">Tặng</button>
        </form>
    </div>

    <div class="card">
        <h2>⚒️ Tặng Trang Bị</h2>
        <form method="post" action="/admin/equip">
            <select name="player_id" required>
                <option value="">-- Chọn người chơi --</option>
                {% for p in players %}
                <option value="{{ p.id }}">{{ p.name }} (Lv.{{ p.level }})</option>
                {% endfor %}
            </select>
            <select id="equip_star_filter" onchange="filterEquip()">
                <option value="">⭐ Tất cả</option>
                {% for s in range(1, 7) %}
                <option value="{{ s }}">{{ '★' * s }}</option>
                {% endfor %}
            </select>
            <select name="equip_id" id="equip_select" required>
                <option value="">-- Chọn trang bị --</option>
                {% for e in equips %}
                <option value="{{ e.id }}" data-star="{{ e.star }}">{{ e.name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Tặng</button>
        </form>
    </div>

    <div class="card">
        <h2>💎 Tặng Đá</h2>
        <form method="post" action="/admin/stones">
            <select name="player_id" required>
                <option value="">-- Chọn người chơi --</option>
                {% for p in players %}
                <option value="{{ p.id }}">{{ p.name }} (Lv.{{ p.level }})</option>
                {% endfor %}
            </select>
            <select name="stone_type" required>
                <option value="stone_basic">Đá Sơ Cấp</option>
                <option value="stone_medium">Đá Trung Cấp</option>
                <option value="stone_advanced">Đá Cao Cấp</option>
                <option value="artifact">Đá Thần Khí</option>
            </select>
            <input name="amount" placeholder="Số lượng" type="number" required>
            <button type="submit">Tặng</button>
        </form>
    </div>

    <div class="card">
        <h2>💎 Tặng Đá Khảm</h2>
        <form method="post" action="/admin/gem">
            <select name="player_id" required>
                <option value="">-- Chọn người chơi --</option>
                {% for p in players %}
                <option value="{{ p.id }}">{{ p.name }} (Lv.{{ p.level }})</option>
                {% endfor %}
            </select>
            <select name="gem_type" required>
                <option value="">-- Chọn loại đá --</option>
                {% for g in gems %}
                <option value="{{ g.type }}">{{ g.name }}</option>
                {% endfor %}
            </select>
            <select name="gem_level" required>
                <option value="">-- Chọn cấp --</option>
                {% for lv in range(1, 10) %}
                <option value="{{ lv }}">Cấp {{ lv }}</option>
                {% endfor %}
            </select>
            <input name="quantity" placeholder="SL" type="number" min="1" value="1" required>
            <button type="submit">Tặng</button>
        </form>
    </div>

    <div class="card">
        <h2>🔥 Tặng Skill</h2>
        <form method="post" action="/admin/skill">
            <select name="player_id" required>
                <option value="">-- Chọn người chơi --</option>
                {% for p in players %}
                <option value="{{ p.id }}">{{ p.name }} (Lv.{{ p.level }})</option>
                {% endfor %}
            </select>
            <select name="skill_id" required>
                <option value="">-- Chọn skill --</option>
                {% for s in skills %}
                <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Tặng</button>
        </form>
    </div>

    <div class="card">
        <h2>🔱 Set Thần Khí</h2>
        <form method="post" action="/admin/artifact">
            <select name="player_id" required>
                <option value="">-- Chọn người chơi --</option>
                {% for p in players %}
                <option value="{{ p.id }}">{{ p.name }} (Lv.{{ p.level }})</option>
                {% endfor %}
            </select>
            <input name="star" placeholder="Sao (1-10)" type="number" min="0" max="10" required>
            <button type="submit">Set</button>
        </form>
    </div>

    <div class="card">
        <h2>⚡ Khác</h2>
        <div class="card-row">
            <form method="post" action="/admin/resetcd">
                <select name="player_id" required>
                    <option value="">-- Chọn người chơi --</option>
                    {% for p in players %}
                    <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
                <button type="submit">Reset CD</button>
            </form>
        </div>
    </div>

    <div class="card">
        <h2>⬆️ Set Level</h2>
        <form method="post" action="/admin/level">
            <select name="player_id" required>
                <option value="">-- Chọn người chơi --</option>
                {% for p in players %}
                <option value="{{ p.id }}">{{ p.name }} (Lv.{{ p.level }})</option>
                {% endfor %}
            </select>
            <input name="level" placeholder="Level mới" type="number" min="1" max="1000" required>
            <button type="submit">Set</button>
        </form>
    </div>
</div>

<script>
function filterEquip() {
    const star = document.getElementById('equip_star_filter').value;
    const select = document.getElementById('equip_select');
    const options = select.querySelectorAll('option');
    options.forEach(opt => {
        if (!opt.value) return;
        const os = opt.getAttribute('data-star');
        opt.style.display = (!star || os === star) ? '' : 'none';
    });
    select.value = '';
}
</script>
{% endblock %}
