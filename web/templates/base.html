<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot-XL Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% if is_admin %}
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-brand">⚔️ Bot-XL</div>
            <nav>
                <a href="/leaderboard" class="nav-item"><span class="nav-icon">🏆</span> Bảng Xếp Hạng</a>
                <a href="/admin" class="nav-item active"><span class="nav-icon">🛠️</span> Admin Panel</a>
            </nav>
            <div class="sidebar-footer">
                <a href="/logout" class="btn-logout">🚪 Logout</a>
            </div>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% else %}
        {% block content_public %}{% endblock %}
    {% endif %}
</body>
</html>
